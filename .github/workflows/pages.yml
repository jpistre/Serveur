name: Build and Deploy 🚀

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🔔
        uses: actions/checkout@v4
      - name: 🧰 Download and run mspa
        run: |
          wget -qO- http://install.mspa.jpistre.fr | sh -s -- binary
          ./mspa build --prod .
      - name: Setup Pages ⚙️
        uses: actions/configure-pages@v4
      - name: 📤 Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./generated"
      - name: 🌍 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
